server:
  port: 8080

mysql:
  mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: 000000
  db: admin

minio:
  host: 127.0.0.1
  port: 9000
  username: minioadmin
  password: minioadmin

jwt:
  secret: "admin-jwt-secret-key-2024"
  expire: 15
  refresh_expire: 10080

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

logger:
  level: "debug"
  format: "console"
  output: "logs/app.log"
  max_size: 100
  max_backups: 7
  max_age: 30
