# 文件轮转配置
file_rotation:
  enabled: true
  days: 30
  hot_bucket: "files"
  cold_bucket: "files-archive"
  batch_size: 100

# 审计日志冷热归档配置
audit_log_archive:
  enabled: true
  retention_days: 90
  batch_size: 1000
