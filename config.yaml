server:
  port: 8080

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password_env: MYSQL_PASSWORD
  db: admin

minio:
  host: 127.0.0.1
  port: 9000
  username_env: MINIO_USERNAME
  password_env: MINIO_PASSWORD

jwt:
  secret_env: JWT_SECRET
  expire: 15
  refresh_expire: 10080

redis:
  host: 127.0.0.1
  port: 6379
  password_env: REDIS_PASSWORD
  db: 0

admin:
  username: admin
  password_env: ADMIN_PASSWORD
  email: admin@test.com
  nickname: 超级管理员

logger:
  level: "debug"
  format: "console"
  output: "logs/app.log"
  max_size: 100
  max_backups: 7
  max_age: 30
  compress: true

# 文件轮转配置
file_rotation:
  enabled: true
  days: 30
  hot_bucket: "files"
  cold_bucket: "files-archive"
  batch_size: 100

# 审计日志冷热归档配置
audit_log_archive:
  enabled: true
  retention_days: 90
  batch_size: 1000
